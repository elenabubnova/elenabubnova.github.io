name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Create config.js from GitHub secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node -e "
          const fs = require('fs');
          const key = process.env.GEMINI_API_KEY;
          if (key) {
            fs.writeFileSync('js/config.js', 'window.GEMINI_API_KEY = ' + JSON.stringify(key) + ';\n');
          } else if (!fs.existsSync('js/config.js')) {
            throw new Error('GEMINI_API_KEY secret is not set and js/config.js is missing');
          }
          "

      - name: Verify config.js
        run: test -f js/config.js && grep -q GEMINI_API_KEY js/config.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
